on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest #El Runner de Github

    steps:
      - name: Checkout
        uses: actions/setup-node@v4
          with:
            node-version: '20'
      - name: instalar depdendencias
        run: npm install

      - name: Ejecutar test
        run: npm test
