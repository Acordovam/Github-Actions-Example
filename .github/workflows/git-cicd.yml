name: Desplegar en Github Pages
on:
  push:
    branches: [master]
permissions: 
  contents: write
jobs:
  build-and-deploy:
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Github Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
